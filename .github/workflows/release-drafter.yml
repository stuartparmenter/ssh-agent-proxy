name: Release Drafter

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-drafter:
    name: Release Drafter
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: release-drafter/release-drafter@563bf132657a13ded0b01fcb723c5a58cdd824e2 # v7
        id: drafter

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-edit
        uses: taiki-e/install-action@7ea35f098a7369cd23488403f58be9c491a6c55f # v2.77.0
        with:
          tool: cargo-edit

      - name: Bump version
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: cargo set-version "$VERSION"

      - name: Commit changes
        env:
          VERSION: ${{ steps.drafter.outputs.resolved_version }}
        run: |
          if ! git diff --quiet Cargo.toml Cargo.lock; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add Cargo.toml Cargo.lock
            git commit -m "Bump version to ${VERSION} [skip ci]"
            git push
          fi
